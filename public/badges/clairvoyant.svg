<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="eye-gradient" x1="50" y1="90" x2="150" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9d00ff" />
      <stop offset="100%" stop-color="#00e5ff" />
    </linearGradient>
  </defs>

  <path d="M100 10 L180 40 V100 C180 150 100 190 100 190 C100 190 20 150 20 100 V40 L100 10 Z" 
        fill="#110022" stroke="#cfc0e3" stroke-width="4" />
        
  <!-- Eye base -->
  <path d="M40 90 Q 100 40 160 90 Q 100 140 40 90 Z" fill="none" stroke="#00e5ff" stroke-width="6" filter="url(#glow-cyan)" />
  <circle cx="100" cy="90" r="22" fill="url(#eye-gradient)" />
  <circle cx="100" cy="90" r="10" fill="#110022" />
  
  <!-- Sparkles -->
  <path d="M100 25 L105 35 L115 40 L105 45 L100 55 L95 45 L85 40 L95 35 Z" fill="#00e5ff" filter="url(#glow-cyan)" />
  
  <text x="100" y="145" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00e5ff" text-anchor="middle">LÁTNOK</text>
</svg>
