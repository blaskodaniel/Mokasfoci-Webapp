<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="explosion" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <path d="M100 10 L180 40 V100 C180 150 100 190 100 190 C100 190 20 150 20 100 V40 L100 10 Z" 
        fill="#2b0d00" stroke="#ff3300" stroke-width="4" />
        
  <!-- Explosion backdrop -->
  <path d="M100 30 L110 50 L140 45 L125 65 L150 85 L125 100 L140 120 L110 110 L95 135 L80 110 L50 120 L65 100 L40 85 L65 65 L50 45 L80 50 Z" 
        fill="#ff9900" filter="url(#explosion)" />
  <path d="M100 45 L108 60 L125 55 L115 70 L130 85 L115 95 L125 110 L108 100 L95 120 L82 100 L65 110 L75 95 L60 85 L75 70 L65 55 L82 60 Z" 
        fill="#ffff00" />
        
  <!-- Dynamite 1 -->
  <g transform="translate(100, 85) rotate(45) translate(-100, -85)">
    <rect x="85" y="55" width="30" height="60" rx="5" fill="#cc0000" stroke="#880000" stroke-width="2" />
    <rect x="85" y="65" width="30" height="5" fill="#000" opacity="0.3" />
    <rect x="85" y="100" width="30" height="5" fill="#000" opacity="0.3" />
    <!-- wick -->
    <path d="M100 55 Q 110 40 90 30" fill="none" stroke="#ddd" stroke-width="3" />
    <circle cx="90" cy="30" r="3" fill="#ffaa00" filter="url(#explosion)" />
  </g>

  <!-- Dynamite 2 -->
  <g transform="translate(100, 85) rotate(-45) translate(-100, -85)">
    <rect x="85" y="55" width="30" height="60" rx="5" fill="#e60000" stroke="#aa0000" stroke-width="2" />
    <rect x="85" y="65" width="30" height="5" fill="#000" opacity="0.3" />
    <rect x="85" y="100" width="30" height="5" fill="#000" opacity="0.3" />
    <!-- wick -->
    <path d="M100 55 Q 90 40 110 30" fill="none" stroke="#ddd" stroke-width="3" />
    <circle cx="110" cy="30" r="3" fill="#ffaa00" filter="url(#explosion)" />
  </g>

  <text x="100" y="150" font-family="Arial, sans-serif" font-size="14" font-weight="900" fill="#ffff00" text-anchor="middle" stroke="#cc0000" stroke-width="4" paint-order="stroke">DOUBLE</text>
  <text x="100" y="150" font-family="Arial, sans-serif" font-size="14" font-weight="900" fill="#ffff00" text-anchor="middle">DOUBLE</text>
  
  <text x="100" y="168" font-family="Arial, sans-serif" font-size="14" font-weight="900" fill="#ffff00" text-anchor="middle" stroke="#cc0000" stroke-width="4" paint-order="stroke">DYNAMITE</text>
  <text x="100" y="168" font-family="Arial, sans-serif" font-size="14" font-weight="900" fill="#ffff00" text-anchor="middle">DYNAMITE</text>
</svg>
