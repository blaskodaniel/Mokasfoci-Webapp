<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-magenta" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <path d="M100 10 L180 40 V100 C180 150 100 190 100 190 C100 190 20 150 20 100 V40 L100 10 Z" 
        fill="#1a001a" stroke="#ff00aa" stroke-width="4" />
        
  <!-- Double Rings (infinity like) -->
  <circle cx="70" cy="85" r="30" fill="none" stroke="#ff00aa" stroke-width="6" filter="url(#glow-magenta)" />
  <circle cx="130" cy="85" r="30" fill="none" stroke="#00ffff" stroke-width="6" filter="url(#glow-magenta)" />
  
  <!-- Overlap dot -->
  <circle cx="100" cy="85" r="8" fill="#ffffff" filter="url(#glow-magenta)" />
  
  <text x="100" y="140" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ff00aa" text-anchor="middle">MÁSODIK</text>
  <text x="100" y="158" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#00ffff" text-anchor="middle">LÁTÁS</text>
</svg>
