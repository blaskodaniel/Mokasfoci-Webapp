<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Glow Effect -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="fire-gradient" x1="100" y1="20" x2="100" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFDD00" />
      <stop offset="50%" stop-color="#FFCC00" />
      <stop offset="100%" stop-color="#FF6B00" />
    </linearGradient>
  </defs>

  <!-- Background Circle (Badge Base) -->
  <circle cx="100" cy="100" r="90" fill="#2d2d2d" stroke="#FF6B00" stroke-width="4" />
  
  <!-- Fire Icon -->
  <path d="M100 30 C100 30 70 70 70 100 C70 140 100 170 100 170 C100 170 130 140 130 100 C130 70 100 30 100 30 Z M100 150 C90 150 85 140 85 125 C85 110 100 90 100 90 C100 90 115 110 115 125 C115 140 110 150 100 150 Z" 
        fill="url(#fire-gradient)" filter="url(#glow)" />

  <!-- Badge Text (Number 3) - Changed color to White for better visibility -->
  <text x="100" y="135" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#FFFFFF" text-anchor="middle">3</text>
  
  <!-- Badge Label - Moved up slightly -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFCC00" text-anchor="middle">HOT STREAK</text>
</svg>
