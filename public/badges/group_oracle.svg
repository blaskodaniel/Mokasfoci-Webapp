<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Glow Effect -->
  <defs>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="oracle-gradient" x1="100" y1="20" x2="100" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00FFCC" />
      <stop offset="100%" stop-color="#00AA66" />
    </linearGradient>
  </defs>

  <!-- Background Circle (Badge Base) -->
  <circle cx="100" cy="100" r="90" fill="#112211" stroke="#00FFCC" stroke-width="3" />
  
  <!-- Target / Crosshair Icon -->
  <circle cx="100" cy="100" r="70" stroke="url(#oracle-gradient)" stroke-width="4" filter="url(#glow-green)" />
  
  <!-- Crosshair lines -->
  <line x1="100" y1="20" x2="100" y2="50" stroke="#00FFCC" stroke-width="4" />
  <line x1="100" y1="150" x2="100" y2="180" stroke="#00FFCC" stroke-width="4" />
  <line x1="20" y1="100" x2="50" y2="100" stroke="#00FFCC" stroke-width="4" />
  <line x1="150" y1="100" x2="180" y2="100" stroke="#00FFCC" stroke-width="4" />

  <!-- Flag Icon Centered -->
  <g transform="translate(75, 55) scale(1.2)">
    <path d="M5 5 V45" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    <path d="M5 5 C15 0 25 10 35 5 S 45 0 45 5 V30 C35 25 25 35 15 30 S -5 25 5 25 Z" fill="#FFFFFF" opacity="0.9"/>
  </g>

  <!-- Badge Label (Two Lines) -->
  <text x="100" y="130" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00FFCC" text-anchor="middle">GROUP</text>
  <text x="100" y="150" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00FFCC" text-anchor="middle">ORACLE</text>
</svg>
