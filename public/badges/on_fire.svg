<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Glow Effect -->
  <defs>
    <filter id="glow-intense" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="purple-fire-gradient" x1="100" y1="20" x2="100" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF3366" />
      <stop offset="50%" stop-color="#FF00CC" />
      <stop offset="100%" stop-color="#9900FF" />
    </linearGradient>
  </defs>

  <!-- Background Hexagon (Badge Base) -->
  <path d="M100 10 L180 50 L180 150 L100 190 L20 150 L20 50 Z" fill="#1a1a1a" stroke="#FF00CC" stroke-width="4" />
  
  <!-- Intense Fire Icon -->
  <path d="M100 25 C100 25 60 70 60 110 C60 155 100 175 100 175 C100 175 140 155 140 110 C140 70 100 25 100 25 Z M100 150 C85 150 75 135 75 115 C75 95 100 65 100 65 C100 65 125 95 125 115 C125 135 115 150 100 150 Z"
        fill="url(#purple-fire-gradient)" filter="url(#glow-intense)" />
        
  <!-- Lightning Bolt overlay -->
  <path d="M105 50 L85 100 L115 100 L95 150" stroke="#FFFFFF" stroke-width="3" fill="none" opacity="0.8" />

  <!-- Badge Text (Number 5) -->
  <text x="100" y="135" font-family="Arial, sans-serif" font-size="45" font-weight="bold" fill="#FFFFFF" text-anchor="middle">5</text>
  
  <!-- Badge Label -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00FFFF" text-anchor="middle">ON FIRE</text>
</svg>
