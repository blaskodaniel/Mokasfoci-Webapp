<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-grey" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <path d="M100 10 L180 40 V100 C180 150 100 190 100 190 C100 190 20 150 20 100 V40 L100 10 Z" 
        fill="#222222" stroke="#888888" stroke-width="6" />
        
  <!-- Brick Wall Pattern inside the shield part -->
  <clipPath id="shield-clip">
    <path d="M100 10 L180 40 V100 C180 150 100 190 100 190 C100 190 20 150 20 100 V40 L100 10 Z" />
  </clipPath>
  
  <g clip-path="url(#shield-clip)">
    <!-- Bricks -->
    <rect x="10" y="50" width="80" height="20" fill="#cc4444" stroke="#000" stroke-width="2" />
    <rect x="90" y="50" width="100" height="20" fill="#cc4444" stroke="#000" stroke-width="2" />
    
    <rect x="-30" y="70" width="80" height="20" fill="#aa3333" stroke="#000" stroke-width="2" />
    <rect x="50" y="70" width="100" height="20" fill="#bb3333" stroke="#000" stroke-width="2" />
    <rect x="150" y="70" width="80" height="20" fill="#cc4444" stroke="#000" stroke-width="2" />
    
    <rect x="10" y="90" width="80" height="20" fill="#bb3333" stroke="#000" stroke-width="2" />
    <rect x="90" y="90" width="100" height="20" fill="#aa3333" stroke="#000" stroke-width="2" />
    
    <rect x="-30" y="110" width="80" height="20" fill="#cc4444" stroke="#000" stroke-width="2" />
    <rect x="50" y="110" width="100" height="20" fill="#aa3333" stroke="#000" stroke-width="2" />
    <rect x="150" y="110" width="80" height="20" fill="#bb3333" stroke="#000" stroke-width="2" />
  </g>
  
  <!-- "0 - 0" Text -->
  <rect x="50" y="70" width="100" height="40" rx="10" fill="#111" opacity="0.8" />
  <text x="100" y="98" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#fff" text-anchor="middle" filter="url(#glow-grey)">0 - 0</text>
  
  <!-- Shield Frame overlaying the bricks again nicely -->
  <path d="M100 10 L180 40 V100 C180 150 100 190 100 190 C100 190 20 150 20 100 V40 L100 10 Z" 
        fill="none" stroke="#aaaaaa" stroke-width="6" />

  <text x="100" y="145" font-family="Arial, sans-serif" font-size="12" font-weight="900" fill="#dddddd" text-anchor="middle" stroke="#000" stroke-width="1">BETONVÉDELEM</text>
</svg>
