<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-gold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="orb-gradient" x1="60" y1="60" x2="140" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff0080" />
      <stop offset="50%" stop-color="#7928ca" />
      <stop offset="100%" stop-color="#111111" />
    </linearGradient>
  </defs>

  <path d="M100 10 L180 40 V100 C180 150 100 190 100 190 C100 190 20 150 20 100 V40 L100 10 Z" 
        fill="#0a0a2a" stroke="#ffd700" stroke-width="4" />
        
  <!-- Base stand for crystal ball -->
  <path d="M80 135 H120 L130 145 H70 Z" fill="#ffd700" />
  <path d="M75 145 H125 L135 150 H65 Z" fill="#b8860b" />
  
  <!-- Crystal Ball -->
  <circle cx="100" cy="85" r="45" fill="url(#orb-gradient)" />
  <circle cx="100" cy="85" r="45" fill="none" stroke="#ffd700" stroke-width="2" filter="url(#glow-gold)" opacity="0.5" />
  
  <!-- Star pattern in ball -->
  <path d="M100 65 L102 72 L109 72 L103 76 L105 83 L100 79 L95 83 L97 76 L91 72 L98 72 Z" fill="#fff" filter="url(#glow-gold)" />
  
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="13" font-weight="900" fill="#ffd700" text-anchor="middle" stroke="#5a3010" stroke-width="3" paint-order="stroke">NOSTRADAMUS</text>
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="13" font-weight="900" fill="#ffd700" text-anchor="middle">NOSTRADAMUS</text>
</svg>
