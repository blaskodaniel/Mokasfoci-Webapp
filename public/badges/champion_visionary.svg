<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Glow Effect -->
  <defs>
    <filter id="glow-gold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="champion-gradient" x1="50" y1="50" x2="150" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
  </defs>

  <!-- Background Shield (Badge Base) -->
  <path d="M100 10 L180 40 V100 C180 150 100 190 100 190 C100 190 20 150 20 100 V40 L100 10 Z" 
        fill="#221100" stroke="#FFD700" stroke-width="4" />
  
  <!-- Trophy / Crown Icon -->
  <path d="M60 70 L80 140 H120 L140 70 L100 90 L60 70 Z" fill="url(#champion-gradient)" filter="url(#glow-gold)" />
  <circle cx="60" cy="65" r="5" fill="#FFD700" />
  <circle cx="140" cy="65" r="5" fill="#FFD700" />
  <circle cx="100" cy="85" r="5" fill="#FFD700" />
  
  <!-- Rays / Vision -->
  <path d="M100 50 L100 25" stroke="#FFD700" stroke-width="2" opacity="0.7" />
  <path d="M70 55 L50 35" stroke="#FFD700" stroke-width="2" opacity="0.7" />
  <path d="M130 55 L150 35" stroke="#FFD700" stroke-width="2" opacity="0.7" />

  <!-- Badge Label - Moved up significantly -->
  <text x="100" y="155" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFD700" text-anchor="middle">CHAMPION</text>
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFD700" text-anchor="middle">VISIONARY</text>
</svg>
